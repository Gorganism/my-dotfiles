################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto
monitor=eDP-1,1920x1080@144,0x0,1
monitor=HDMI-A-1,1920x1080@180,1920x0,1
#monitor=HDMI-A-1,preferred,auto,1,mirror,eDP-1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
#$fileManager = dolphin
$menu = wofi -S drun
$browser = floorp
# in wofi, the I tag includes images for apps.

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

# exec-once = /usr/bin/pipewire & /usr/bin/pipewire-pulse & /usr/bin/wireplumber ; hyprpaper & mako & waybar & brightnessctl s 50%

# the actual main one below may have been moved to be under envs.
exec-once = hyprpaper & mako & waybar & brightnessctl s 50%

# previously brightnessctl would be set to 60%.

