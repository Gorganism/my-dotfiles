#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 13

    border_size = 2
    # preferred border size is 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border = rgba(4c566aee) rgba(d8dee9ee) 45deg
    # col.inactive_border = rgba(3b4252ee)
    col.active_border =  rgba(585b70ee) rgba(f5c2e7ee) 90deg
    col.inactive_border = rgba(1e1e2eee)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
    # dwindle = i3 like?
    # master = dwm like (includes a stack)
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 0
    # normally i keep rounding at 5
    # normally i keep power at 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 0
        # range is normally 3
        render_power = 1
        # sharp = true 
        offset = 5, 5
        # color = rgba(2e3440ee)
        # color = rgba(181825ee)
        color = rgba(313244aa)
        color_inactive = rgba(11111bbb)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    # bezier = easeOutQuinty,0.23,1,0.32,1.05
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = overshot, 0.22, 0.99, 0.23, 1.03
    # bezier = ease, 0.25, 0.1, 0.25, 1.0

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    # animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspaces, 1, 4.3, overshot, slide
    animation = specialWorkspaceIn, 1, 4.3, overshot, slide bottom
    animation = specialWorkspaceOut, 1, 4.3, overshot, slide top
    # animation = workspacesIn, 1, 1.21, almostLinear, fade
    # animation = workspacesOut, 1, 1.94, almostLinear, fade
    # animation = windows, 1, 4, default, popin 80%
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.305 # -1.0 - 1.0, 0 means no modification.

    accel_profile = flat

    touchpad {
        disable_while_typing = false
        clickfinger_behavior = true
        scroll_factor = 0.7
        natural_scroll = true
        # sensitivity = 0
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = opentabletdriver-virtual-artist-tablet
    output = HDMI-A-1
}
# device {
#     name = evision-rgb-keyboard
#     kb_layout = us,jp
# }


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# $mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = Super, T, exec, $terminal
# bind = Super, C, killactive,
bind = Super, L, exec, hyprlock
bind = Super, M, exit, exec, pkill waybar && pkill mako && pkill hyprpaper && pkill fcitx5 && pkill mozc_server # killall waybar mako hyprpaper fcitx5 mozc_server 
bind = Super, E, exec, $fileManager
bind = Super, V, togglefloating,
bind = Super, R, exec, $menu
# bind = Super, P, pseudo, # (dwindle) this is pseudo tiling
bind = Super, J, togglesplit, # dwindle
bind = Super, F, exec, $browser
# bind = Super, D, exec, vesktop
bind = Super, PRINT, exec, hyprshot --freeze -m output --clipboard-only
bind = , PRINT, exec, hyprshot --freeze -m region --clipboard-only
bind = Super Ctrl, PRINT, exec, hyprshot --freeze -m output --output-folder ~/Downloads/
bind = Ctrl, PRINT, exec, hyprshot --freeze -m region --output-folder ~/Downloads/
bind = Alt, Q, killactive,
bind = Ctrl Alt, Q, forcekillactive
bind = Super, K, exec, hyprctl kill
bind = Super, F1, exec, hyprctl keyword general:layout dwindle
bind = Super, F2, exec, hyprctl keyword general:layout master
bind = Super Shift, left, layoutmsg, orientationleft
bind = Super Shift, right, layoutmsg, orientationright
bind = Super Shift, F, fullscreen,
# bind = Super, F3, exec, hyprctl hyprpaper reload , /home/gorganism/.config/hypr/neurojetdark.jpg
# bind = Super, F4, exec, hyprctl hyprpaper reload , /home/gorganism/.config/hypr/koishi.jpg
# bind = Super, F5, exec, hyprctl switchxkblayout evision-rgb-keyboard next
# bind = Super, F5, exec, fcitx5

#### IMPORTANT HYPRSHOT THING #### https://github.com/Gustash/Hyprshot/issues/60
# layerrule = match:class selector, # no_anim on
# layerrule {
#     name = hyprshot_border_fixer
#     match:class = selector
#     no_anim = on
# }

layerrule = match:namespace selection, no_anim on

# Move focus with mainMod + arrow keys
bind = Super, left, movefocus, l
bind = Super, right, movefocus, r
bind = Super, up, movefocus, u
bind = Super, down, movefocus, d
bind = Super Alt, left, movewindow, l
bind = Super Alt, right, movewindow, r
bind = Super Alt, up, movewindow, u
bind = Super Alt, down, movewindow, d
bind = Super, Grave, cyclenext
bind = Super Shift, Grave, cyclenext, prev
bind = Super Alt, Grave, swapnext
bind = Super Alt Shift, Grave, swapnext, prev
bind = Super Ctrl, left, resizeactive, -20 0
bind = Super Ctrl, right, resizeactive, 20 0
bind = Super Ctrl, up, resizeactive, 0 -20
bind = Super Ctrl, down, resizeactive, 0 20

# Switch workspaces with mainMod + [0-9]
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = Super Shift, 1, movetoworkspace, 1
bind = Super Shift, 2, movetoworkspace, 2
bind = Super Shift, 3, movetoworkspace, 3
bind = Super Shift, 4, movetoworkspace, 4
bind = Super Shift, 5, movetoworkspace, 5
bind = Super Shift, 6, movetoworkspace, 6
bind = Super Shift, 7, movetoworkspace, 7
bind = Super Shift, 8, movetoworkspace, 8
bind = Super Shift, 9, movetoworkspace, 9
bind = Super Shift, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = Super, S, togglespecialworkspace, magic
bind = Super Shift, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = Super, mouse_down, workspace, e+1
bind = Super, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
# binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
# binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# pre 0.53:
# windowrule = suppressevent maximize, class:.*
# post 0.53:
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
# pre 0.53:
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
# post 0.53:
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
# apparently 0.53 added this too:
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
